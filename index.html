<!DOCTYPE html>
<html lang="en" style="background:#0f172a;color-scheme:dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Surface</title>
  </head>
  <body style="background:#0f172a">
    <div id="root"></div>
    <script>
      // Pre-module error trap — catches import-evaluation failures that kill the module graph
      window.addEventListener('error', function(e) {
        console.error('[LS:pre-module]', e.message, e.filename, e.lineno, e.colno);
        var root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          root.style.cssText = 'padding:32px;color:#f87171;font-family:monospace;white-space:pre-wrap';
          root.innerHTML = '<h2>Module load error</h2><p>' + e.message + '</p><p>' + (e.filename || '') + ':' + (e.lineno || '') + '</p>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.error('[LS:pre-module-rejection]', e.reason);
      });
    </script>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
